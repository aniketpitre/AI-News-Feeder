apiVersion: batch/v1
kind: CronJob
metadata:
  name: ai-news-sync-cron
  namespace: ai-news
spec:
  schedule: "0 * * * *"  # Run every hour, on the hour
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: feed-syncer
            image: 410386583102.dkr.ecr.ap-south-1.amazonaws.com/ai-news-feeder:latest
            imagePullPolicy: Always
            command:
            - npx
            - tsx
            - scripts/sync-feeds.ts
            env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-secret
                  key: GEMINI_API_KEY
            - name: FIREBASE_SERVICE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: firebase-secret
                  key: FIREBASE_SERVICE_ACCOUNT
                  optional: true  # Optional fallback: can also use default projectId config
          restartPolicy: OnFailure
